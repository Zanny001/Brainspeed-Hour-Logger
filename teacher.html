<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Brainspeed International</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #635BFF;
            --primary-hover: #0A2540;
            --danger: #FF2F4C;
            --danger-hover: #D91A34;
            --success: #00D924;
            --bg: #F6F9FC;
            --card-bg: #FFFFFF;
            --text: #1A1F36;
            --text-muted: #4F566B;
            --border: #E3E8EE;
            --table-header: #FAFAFA;
        }
        [data-theme="dark"] {
            --primary: #7770FF;
            --primary-hover: #FFFFFF;
            --danger: #FF2F4C;
            --danger-hover: #FFF;
            --success: #00D924;
            --bg: #0A2540;
            --card-bg: #102A43;
            --text: #F4F6F8;
            --text-muted: #9FB3C8;
            --border: #243B53;
            --table-header: #1F3A52;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .container { width: 100%; max-width: 750px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 20px 30px; background: var(--card-bg); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid var(--border); }
        .brand { color: var(--primary); font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
        .card { background: var(--card-bg); border-radius: 16px; box-shadow: 0 20px 25px rgba(0,0,0,0.04); padding: 40px; border: 1px solid var(--border); }
        .tabs { display: flex; gap: 12px; margin-bottom: 30px; background: var(--table-header); padding: 6px; border-radius: 30px; display: inline-flex; border: 1px solid var(--border); }
        .tab { padding: 10px 24px; border-radius: 20px; cursor: pointer; font-weight: 600; color: var(--text-muted); transition: all 0.2s; font-size: 14px; }
        .tab.active { background: var(--card-bg); color: var(--primary); border: 1px solid var(--border); }
        .view { display: none; animation: fadeIn 0.3s ease; } .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        select, input, textarea { width: 100%; padding: 16px; margin: 8px 0 24px 0; border: 1px solid var(--border); border-radius: 12px; font-family: 'Inter'; box-sizing: border-box; background: var(--table-header); color: var(--text); transition: all 0.2s; font-size: 15px; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.15); }
        label { font-weight: 600; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        button { padding: 16px; font-weight: 600; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; transition: all 0.2s; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:active { transform: scale(0.98); }
        #checkInBtn { background: var(--primary); } #checkInBtn:hover { opacity: 0.9; }
        #checkOutBtn { background: var(--danger); display: none; } #checkOutBtn:hover { opacity: 0.9; }
        .btn-save { background: var(--success); } .btn-save:hover { opacity: 0.9; }
        .status-box { margin-top: 24px; padding: 24px; border-radius: 12px; background: rgba(99,91,255,0.12); color: var(--primary); display: none; border: 1px solid var(--border); text-align: center; }
        .logout { color: var(--danger); text-decoration: none; font-weight: 600; cursor: pointer; font-size: 14px; padding: 8px 16px; border-radius: 8px; background: rgba(255,47,76,0.08); }
        .theme-btn { background: var(--table-header); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">✨ Brainspeed</div>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="theme-btn" onclick="toggleTheme()">🌓 Mode</button>
                <span style="font-weight:600; font-size:15px; color: var(--text-muted);">Teacher: <span id="teacherName" style="color: var(--text);"></span></span>
                <a class="logout" onclick="handleLogout()">Sign Out</a>
            </div>
        </div>

        <div style="text-align: center;">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('logger', this)">Live Session Console</div>
                <div class="tab" onclick="switchTab('profile', this)">Professional Profile</div>
            </div>
        </div>

        <div class="card">
            <div id="logger-view" class="view active">
                <h2 style="margin-bottom:24px; font-weight:800; color:var(--text); font-size: 24px;">Initialize Lesson</h2>

                <label>Select Student Protocol</label>
                <select id="studentId"><option value="">-- Load Roster --</option></select>

                <label>Academic Subject</label>
                <select id="subjectTaught">
                    <option value="Mathematics">Mathematics</option><option value="English Language">English Language</option>
                    <option value="Physics">Physics</option><option value="Chemistry">Chemistry</option><option value="Biology">Biology</option>
                    <option value="Basic Science">Basic Science</option><option value="Economics">Economics</option>
                    <option value="Computer Science/ICT">Computer Science/ICT</option><option value="Other">Other</option>
                </select>

                <button id="checkInBtn" onclick="initiateCheckIn()">📍 Activate GPS Tracking & Start Lesson</button>
                <button id="checkOutBtn" onclick="handleCheckOut()">⏹ Terminate Session & Synchronize</button>

                <div id="statusBox" class="status-box">
                    <div style="font-size:18px; font-weight:800; margin-bottom:8px;">⏳ Session in Progress</div>
                    Commenced at: <span id="timeDisplay" style="font-weight:600; background: var(--card-bg); padding: 4px 10px; border-radius: 6px; margin-left: 8px;"></span>
                </div>
            </div>

            <div id="profile-view" class="view">
                <h2 style="margin-bottom:24px; font-weight:800; font-size: 24px;">Academic Credentials</h2>
                <label>Areas of Expertise</label>
                <input type="text" id="profSubjects" placeholder="e.g., Advanced Calculus, Quantum Physics">

                <label>Professional Biography</label>
                <textarea id="profBio" rows="4" placeholder="Detail background philosophy..."></textarea>

                <button class="btn-save" onclick="saveProfile()">💾 Commit Profile Updates</button>
            </div>
        </div>
    </div>

    <script>
        const tid = localStorage.getItem('user_id');
        if(!tid) window.location.href='/';
        document.getElementById('teacherName').innerText = localStorage.getItem('username').toUpperCase();
        let activeSession = JSON.parse(localStorage.getItem('active_lesson')) || null;

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('teacher-theme', target);
        }
        if(localStorage.getItem('teacher-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        function switchTab(viewId, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            el.classList.add('active'); document.getElementById(viewId + '-view').classList.add('active');
        }

        async function loadStudents() {
            const res = await fetch('/api/users/student'); const students = await res.json();
            const select = document.getElementById('studentId'); select.innerHTML = '<option value="">-- Select Registered Student --</option>';
            students.forEach(st => select.innerHTML += `<option value="${st.id}">${st.username.toUpperCase()}</option>`);
            updateUI();
        }

        async function loadProfile() {
            const res = await fetch(`/api/profile/${tid}`); const profile = await res.json();
            document.getElementById('profSubjects').value = profile.subjects || '';
            document.getElementById('profBio').value = profile.bio || '';
        }

        async function saveProfile() {
            const subjects = document.getElementById('profSubjects').value;
            const bio = document.getElementById('profBio').value;
            await fetch(`/api/profile/${tid}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({subjects, bio}) });
            alert("Credentials successfully updated.");
        }

        function updateUI() {
            if (activeSession) {
                document.getElementById('checkInBtn').style.display = 'none'; document.getElementById('checkOutBtn').style.display = 'flex';
                document.getElementById('statusBox').style.display = 'block'; document.getElementById('timeDisplay').innerText = new Date(activeSession.check_in_time).toLocaleTimeString();
                document.getElementById('studentId').value = activeSession.student_id; document.getElementById('studentId').disabled = true; document.getElementById('subjectTaught').disabled = true;
            } else {
                document.getElementById('checkInBtn').style.display = 'flex'; document.getElementById('checkOutBtn').style.display = 'none';
                document.getElementById('statusBox').style.display = 'none'; document.getElementById('studentId').disabled = false; document.getElementById('subjectTaught').disabled = false;
            }
        }

        function initiateCheckIn() {
            if(!document.getElementById('studentId').value) return alert("You must select a student protocol.");
            document.getElementById('checkInBtn').innerHTML = "⏳ Acquiring Satellite Lock...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => proceedCheckIn(pos.coords.latitude, pos.coords.longitude),
                    (err) => proceedCheckIn(0, 0)
                );
            } else proceedCheckIn(0, 0);
        }

        function proceedCheckIn(lat, lng) {
            const today = new Date().toISOString().split('T')[0];
            activeSession = {
                teacher_id: tid,
                student_id: document.getElementById('studentId').value,
                subject: document.getElementById('subjectTaught').value,
                session_date: today,
                check_in_time: new Date().toISOString(), lat: lat, lng: lng
            };
            localStorage.setItem('active_lesson', JSON.stringify(activeSession)); updateUI();
            document.getElementById('checkInBtn').innerHTML = "📍 Activate GPS Tracking & Start Lesson";
        }

        async function handleCheckOut() {
            const end = new Date(), start = new Date(activeSession.check_in_time);
            const res = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({...activeSession, check_out_time: end.toLocaleString(), check_in_time: start.toLocaleString(), hours: ((end - start) / 3600000).toFixed(2)})
            });
            if(res.ok) { alert("Session successfully synchronized."); localStorage.removeItem('active_lesson'); activeSession = null; updateUI(); }
        }

        async function handleLogout() {
            if (tid) {
                try { await fetch('/api/sessions/auto-checkout', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ teacher_id: tid }) }); } catch (e) {}
            }
            localStorage.clear(); window.location.href = '/';
        }

        loadStudents(); loadProfile();
    </script>
</body>
</html>
